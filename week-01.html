  "sam-din":{

  },

  "dim-din":{

    steps:`<div class="step-block"><div class="step-header"><div class="step-num">1</div><div class="step-title">Faire revenir</div><span class="step-timing">⏱ 5 min</span></div><div class="step-desc">Faites revenir poireaux émincés + oignon dans un filet d'huile 5 min à feu moyen.</div></div><div class="step-block"><div class="step-header"><div class="step-num">2</div><div class="step-title">Cuire</div><span class="step-timing">⏱ 20 min</span></div><div class="step-desc">Ajoutez pomme de terre en cubes + bouillon. Cuisez 20 min à feu moyen jusqu'à ce que les pommes de terre soient tendres.</div></div><div class="step-block"><div class="step-header"><div class="step-num">3</div><div class="step-title">Finaliser</div><span class="step-timing">⏱ 2 min</span></div><div class="step-desc">Mixez partiellement (gardez des morceaux). Ajoutez crème + ciboulette. Léger, réconfortant, parfait avant la semaine qui recommence.</div></div>`

,
  "lun-des-midi":{title:"Panna cotta vanille & fruits rouges",ingredients:[{name:"Crème légère",base:150,unit:"ml"},{name:"Lait d'amande",base:100,unit:"ml"},{name:"Agar-agar",base:1,unit:"c.à.c."},{name:"Extrait de vanille",base:1,unit:"c.à.c."},{name:"Miel brut",base:1,unit:"c.à.s."},{name:"Fruits rouges",base:80,unit:"g"}],steps:`<div class="step-block"><div class="step-header"><div class="step-num">1</div><div class="step-title">Chauffer la crème</div><span class="step-timing">⏱ 5 min</span></div><div class="step-desc">Mélangez crème + lait d'amande + agar-agar dans une casserole. Portez à frémissement en remuant sans arrêt. L'agar-agar doit se dissoudre complètement (2 min d'ébullition douce).</div><div class="step-tip">L'agar-agar remplace la gélatine animale et fonctionne à froid — parfait pour une panna cotta végétarienne.</div></div><div class="step-block"><div class="step-header"><div class="step-num">2</div><div class="step-title">Parfumer et couler</div><span class="step-timing">⏱ 2 min</span></div><div class="step-desc">Hors du feu, ajoutez vanille + miel. Remuez. Coulez dans des verrines ou pots hermétiques. Laissez tiédir puis réfrigérez minimum 3 heures.</div></div><div class="step-block"><div class="step-header"><div class="step-num">3</div><div class="step-title">Garnir au moment</div><span class="step-timing">⏱ 1 min</span></div><div class="step-desc">Au moment de manger, posez les fruits rouges dessus. Transportez la verrine fermée et les fruits à part.</div><div class="step-tip">Préparez 2-3 verrines le dimanche — elles tiennent 4 jours au frigo. Le dessert de la semaine est prêt.</div></div>`},
  "lun-des-soir":{title:"Mousse au chocolat noir maison",ingredients:[{name:"Chocolat noir 70%",base:80,unit:"g"},{name:"Blancs d'oeufs",base:3,unit:""},{name:"Jaunes d'oeufs",base:2,unit:""},{name:"Sel",base:1,unit:"pincée"}],steps:`<div class="step-block"><div class="step-header"><div class="step-num">1</div><div class="step-title">Fondre le chocolat</div><span class="step-timing">⏱ 5 min</span></div><div class="step-desc">Faites fondre le chocolat au bain-marie ou micro-ondes (30 sec par 30 sec). Laissez tiédir 5 min. Incorporez les jaunes d'oeufs un à un.</div><div class="step-tip">Le chocolat ne doit pas être trop chaud quand vous ajoutez les jaunes — sinon ils cuisent et font des grumeaux.</div></div><div class="step-block"><div class="step-header"><div class="step-num">2</div><div class="step-title">Monter les blancs</div><span class="step-timing">⏱ 3 min</span></div><div class="step-desc">Montez les blancs en neige ferme avec une pincée de sel. Ils doivent former un bec d'oiseau ferme quand vous soulevez le batteur.</div></div><div class="step-block"><div class="step-header"><div class="step-num">3</div><div class="step-title">Incorporer délicatement</div><span class="step-timing">⏱ 3 min</span></div><div class="step-desc">Incorporez 1/3 des blancs au chocolat en remuant vite. Puis ajoutez le reste en 2 fois avec une maryse, en mouvements circulaires de bas en haut pour ne pas faire tomber les blancs.</div><div class="step-tip">La légèreté de la mousse vient des blancs en neige intacts — ne remuez pas trop !</div></div><div class="step-block"><div class="step-header"><div class="step-num">4</div><div class="step-title">Réfrigérer</div><span class="step-timing">⏱ 2h</span></div><div class="step-desc">Répartissez dans des ramequins. Minimum 2 heures au frigo. Peut se préparer la veille.</div></div>`},
  "mar-des-midi":{title:"Yaourt grec façon cheesecake citron",ingredients:[{name:"Yaourt grec",base:150,unit:"g"},{name:"Citron (zeste)",base:1,unit:""},{name:"Miel brut",base:1,unit:"c.à.c."},{name:"Flocons d'avoine",base:20,unit:"g"},{name:"Cannelle",base:0.5,unit:"c.à.c."}],steps:`<div class="step-block"><div class="step-header"><div class="step-num">1</div><div class="step-title">Base biscuitée</div><span class="step-timing">⏱ 3 min</span></div><div class="step-desc">Toastez les flocons d'avoine à sec dans une petite poêle 2-3 min jusqu'à dorure. Mélangez avec une pincée de cannelle et une goutte de miel. Laissez refroidir.</div><div class="step-tip">Les flocons toastés donnent un côté "biscuité" qui rappelle la base d'un vrai cheesecake.</div></div><div class="step-block"><div class="step-header"><div class="step-num">2</div><div class="step-title">Crème citron</div><span class="step-timing">⏱ 2 min</span></div><div class="step-desc">Mélangez yaourt grec + zeste finement râpé de citron + miel. La crème doit être lisse et parfumée.</div></div><div class="step-block"><div class="step-header"><div class="step-num">3</div><div class="step-title">Monter la verrine</div></div><div class="step-desc">En verrine ou pot : base de flocons toastés, crème yaourt-citron dessus. Fermez hermétiquement. Le croustillant reste si les flocons sont bien refroidis avant l'assemblage.</div></div>`},
  "mar-des-soir":{title:"Compote pomme-poire-cannelle maison",ingredients:[{name:"Pommes",base:2,unit:""},{name:"Poires",base:1,unit:""},{name:"Cannelle",base:1,unit:"c.à.c."},{name:"Vanille",base:1,unit:"gousse"},{name:"Jus de citron",base:1,unit:"c.à.s."}],steps:`<div class="step-block"><div class="step-header"><div class="step-num">1</div><div class="step-title">Préparer les fruits</div><span class="step-timing">⏱ 5 min</span></div><div class="step-desc">Pelez et coupez pommes + poires en cubes. Arrosez de jus de citron pour éviter l'oxydation.</div></div><div class="step-block"><div class="step-header"><div class="step-num">2</div><div class="step-title">Cuire</div><span class="step-timing">⏱ 15 min</span></div><div class="step-desc">Mettez les fruits dans une casserole avec 2 c.à.s. d'eau + cannelle + vanille. Couvrez et cuisez 15 min à feu doux en remuant de temps en temps. Écrasez à la fourchette selon texture désirée.</div><div class="step-tip">Zéro sucre ajouté — les fruits mûrs sont naturellement sucrés. Si vous aimez très sucré, ajoutez 1 c.à.c. de miel hors du feu.</div></div><div class="step-block"><div class="step-header"><div class="step-num">3</div><div class="step-title">Conserver</div></div><div class="step-desc">Se conserve 5 jours au frigo dans un pot fermé. Préparez-en une grande quantité le dimanche — dessert du soir plusieurs fois dans la semaine.</div></div>`},
  "mer-des-midi":{title:"Verrine fromage blanc & myrtilles",ingredients:[{name:"Fromage blanc 0%",base:150,unit:"g"},{name:"Myrtilles",base:60,unit:"g"},{name:"Miel brut",base:1,unit:"c.à.c."},{name:"Granola maison",base:20,unit:"g"},{name:"Vanille",base:0.5,unit:"c.à.c."}],steps:`<div class="step-block"><div class="step-header"><div class="step-num">1</div><div class="step-title">Préparer la crème</div><span class="step-timing">⏱ 2 min</span></div><div class="step-desc">Mélangez fromage blanc + vanille + miel. Goûtez et ajustez la douceur.</div></div><div class="step-block"><div class="step-header"><div class="step-num">2</div><div class="step-title">Monter la verrine</div></div><div class="step-desc">Granola en base, crème de fromage blanc dessus, myrtilles. Transportez le granola à part si vous voulez qu'il reste croquant au moment de manger.</div><div class="step-tip">Les myrtilles sont riches en antioxydants — le dessert qui fait du bien autant qu'il régale.</div></div>`},
  "mer-des-soir":{title:"Clafoutis fruits rouges maison",ingredients:[{name:"Oeufs",base:2,unit:""},{name:"Lait demi-écrémé",base:150,unit:"ml"},{name:"Farine de sarrasin",base:40,unit:"g"},{name:"Miel brut",base:2,unit:"c.à.s."},{name:"Vanille",base:1,unit:"c.à.c."},{name:"Fruits rouges",base:150,unit:"g"}],steps:`<div class="step-block"><div class="step-header"><div class="step-num">1</div><div class="step-title">Préparer la pâte</div><span class="step-timing">⏱ 5 min</span></div><div class="step-desc">Fouettez oeufs + miel + vanille. Ajoutez la farine de sarrasin en pluie, mélangez. Versez le lait progressivement — pâte lisse et sans grumeaux.</div><div class="step-tip">La farine de sarrasin donne un goût légèrement noisette très agréable et remplace avantageusement la farine blanche.</div></div><div class="step-block"><div class="step-header"><div class="step-num">2</div><div class="step-title">Monter et cuire</div><span class="step-timing">⏱ 25 min</span></div><div class="step-desc">Beurrez légèrement un plat. Répartissez les fruits. Versez la pâte dessus. Four 180°C, 25 min. Le clafoutis doit être doré et légèrement tremblotant au centre.</div></div><div class="step-block"><div class="step-header"><div class="step-num">3</div><div class="step-title">Tiède ou froid</div></div><div class="step-desc">Délicieux tiède à la sortie du four ou froid le lendemain. Se conserve 3 jours au frigo.</div></div>`},
  "jeu-des-midi":{title:"Salade de fruits exotiques & menthe",ingredients:[{name:"Mangue",base:0.5,unit:""},{name:"Ananas",base:100,unit:"g"},{name:"Kiwi",base:1,unit:""},{name:"Citron vert (jus)",base:1,unit:"c.à.s."},{name:"Menthe fraîche",base:5,unit:"feuilles"},{name:"Miel brut",base:0.5,unit:"c.à.c."}],steps:`<div class="step-block"><div class="step-header"><div class="step-num">1</div><div class="step-title">Couper les fruits</div><span class="step-timing">⏱ 5 min</span></div><div class="step-desc">Pelez et coupez tous les fruits en cubes réguliers. Mélangez dans un bol.</div></div><div class="step-block"><div class="step-header"><div class="step-num">2</div><div class="step-title">Assaisonner</div></div><div class="step-desc">Arrosez de jus de citron vert + miel. Ajoutez la menthe ciselée au dernier moment. Mélangez délicatement et mettez en boîte hermétique.</div><div class="step-tip">Le jus de citron vert sublime les fruits exotiques et prévient l'oxydation. La menthe apporte une fraîcheur inattendue.</div></div>`},
  "jeu-des-soir":{title:"Riz au lait vanille & cannelle",ingredients:[{name:"Riz rond",base:50,unit:"g"},{name:"Lait demi-écrémé",base:400,unit:"ml"},{name:"Vanille",base:1,unit:"gousse"},{name:"Miel brut",base:1,unit:"c.à.s."},{name:"Cannelle",base:0.5,unit:"c.à.c."}],steps:`<div class="step-block"><div class="step-header"><div class="step-num">1</div><div class="step-title">Infuser la vanille</div><span class="step-timing">⏱ 5 min</span></div><div class="step-desc">Fendez la gousse de vanille et grattez les graines. Chauffez le lait avec la gousse + graines jusqu'à frémissement. Laissez infuser 5 min hors du feu.</div><div class="step-tip">L'infusion dans un lait chaud extrait tous les arômes de la vanille — bien meilleur qu'un simple extrait.</div></div><div class="step-block"><div class="step-header"><div class="step-num">2</div><div class="step-title">Cuire le riz</div><span class="step-timing">⏱ 30 min</span></div><div class="step-desc">Retirez la gousse. Versez le riz dans le lait vanillé. Feu très doux, remuez régulièrement pendant 25-30 min jusqu'à texture crémeuse. Le riz doit être fondant.</div><div class="step-tip">La patience est la clé du riz au lait. Feu doux et remuage fréquent donnent une texture soyeuse incomparable.</div></div><div class="step-block"><div class="step-header"><div class="step-num">3</div><div class="step-title">Sucrer et dresser</div></div><div class="step-desc">Hors du feu, ajoutez le miel + cannelle. Versez dans des ramequins. Mangez tiède ou froid. Se conserve 3 jours au frigo.</div></div>`},
  "ven-des-midi":{title:"Mousse yaourt-citron en verrine",ingredients:[{name:"Yaourt grec",base:100,unit:"g"},{name:"Blanc d'oeuf",base:1,unit:""},{name:"Citron (zeste + jus)",base:1,unit:""},{name:"Miel brut",base:1,unit:"c.à.c."}],steps:`<div class="step-block"><div class="step-header"><div class="step-num">1</div><div class="step-title">Préparer la base citron</div><span class="step-timing">⏱ 2 min</span></div><div class="step-desc">Mélangez yaourt grec + zeste de citron + jus de citron + miel. La crème doit être bien parfumée.</div></div><div class="step-block"><div class="step-header"><div class="step-num">2</div><div class="step-title">Monter le blanc et incorporer</div><span class="step-timing">⏱ 5 min</span></div><div class="step-desc">Montez le blanc en neige ferme. Incorporez-le délicatement au yaourt en mouvements circulaires. La mousse doit rester aérienne.</div><div class="step-tip">Ce dessert est comme un nuage — très léger, très frais. Parfait pour finir un repas sans se sentir lourde.</div></div><div class="step-block"><div class="step-header"><div class="step-num">3</div><div class="step-title">Réfrigérer</div><span class="step-timing">⏱ 1h</span></div><div class="step-desc">Versez en verrine, réfrigérez minimum 1 heure. Fermez hermétiquement pour le transport.</div></div>`},
  "ven-des-soir":{title:"Fondant au chocolat noir coulant",ingredients:[{name:"Chocolat noir 70%",base:100,unit:"g"},{name:"Beurre",base:40,unit:"g"},{name:"Oeufs",base:2,unit:""},{name:"Miel brut",base:2,unit:"c.à.s."},{name:"Farine d'amande",base:30,unit:"g"},{name:"Sel",base:1,unit:"pincée"}],steps:`<div class="step-block"><div class="step-header"><div class="step-num">1</div><div class="step-title">Fondre et mélanger</div><span class="step-timing">⏱ 5 min</span></div><div class="step-desc">Faites fondre chocolat + beurre au bain-marie. Hors du feu, ajoutez miel + oeufs battus + sel. Mélangez bien. Incorporez la farine d'amande en dernier.</div><div class="step-tip">La farine d'amande remplace la farine blanche — moins de glucides, plus de protéines, et un goût incomparable.</div></div><div class="step-block"><div class="step-header"><div class="step-num">2</div><div class="step-title">Cuire exactement 12 min</div><span class="step-timing">⏱ 12 min</span></div><div class="step-desc">Préchauffez le four à 200°C. Beurrez des ramequins. Versez la pâte. Enfournez EXACTEMENT 12 min. Les bords doivent être pris, le centre encore tremblant.</div><div class="step-tip">Le timing est CRUCIAL pour le coeur coulant. 12 min pile à 200°C dans un four bien préchauffé. Pas une minute de plus.</div></div><div class="step-block"><div class="step-header"><div class="step-num">3</div><div class="step-title">Démouler et déguster</div><span class="step-timing">⏱ 1 min</span></div><div class="step-desc">Attendez 1 min, passez un couteau sur les bords et retournez sur une assiette. Le coeur doit couler. Dégustez immédiatement.</div></div>`},
  "sam-des-midi":{title:"Tarte fine pomme-cannelle sur galette avoine",ingredients:[{name:"Flocons d'avoine",base:60,unit:"g"},{name:"Miel brut",base:1,unit:"c.à.s."},{name:"Huile de coco",base:1,unit:"c.à.s."},{name:"Pommes",base:2,unit:""},{name:"Cannelle",base:1,unit:"c.à.c."},{name:"Compote sans sucre",base:2,unit:"c.à.s."}],steps:`<div class="step-block"><div class="step-header"><div class="step-num">1</div><div class="step-title">Galette avoine (base)</div><span class="step-timing">⏱ 15 min</span></div><div class="step-desc">Mixez flocons d'avoine + miel + huile de coco fondue + 2 c.à.s. d'eau. Étalez sur papier cuisson en cercle fin. Four 180°C, 12 min jusqu'à dorure. Laissez refroidir.</div></div><div class="step-block"><div class="step-header"><div class="step-num">2</div><div class="step-title">Pommes caramélisées</div><span class="step-timing">⏱ 10 min</span></div><div class="step-desc">Pelez et tranchez les pommes finement. Faites-les sauter 5 min dans une poêle avec cannelle + 1 c.à.c. miel. Elles doivent être dorées et tendres.</div></div><div class="step-block"><div class="step-header"><div class="step-num">3</div><div class="step-title">Assembler</div></div><div class="step-desc">Sur la galette refroidie : couche de compote, puis les lamelles de pommes en rosace. Saupoudrez de cannelle. Transportez en boîte.</div></div>`},
  "sam-des-soir":{title:"Crème brûlée allégée à la vanille",ingredients:[{name:"Crème légère",base:200,unit:"ml"},{name:"Jaunes d'oeufs",base:3,unit:""},{name:"Miel brut",base:2,unit:"c.à.s."},{name:"Vanille",base:1,unit:"gousse"},{name:"Cassonade",base:2,unit:"c.à.c."}],steps:`<div class="step-block"><div class="step-header"><div class="step-num">1</div><div class="step-title">Infuser la vanille</div><span class="step-timing">⏱ 10 min</span></div><div class="step-desc">Chauffez la crème avec la gousse de vanille fendue jusqu'à frémissement. Laissez infuser 10 min hors du feu.</div></div><div class="step-block"><div class="step-header"><div class="step-num">2</div><div class="step-title">Préparer l'appareil</div><span class="step-timing">⏱ 5 min</span></div><div class="step-desc">Fouettez jaunes d'oeufs + miel jusqu'à blanchiment. Versez la crème chaude progressivement en remuant sans arrêt — ne cuisez pas les jaunes.</div></div><div class="step-block"><div class="step-header"><div class="step-num">3</div><div class="step-title">Cuire au bain-marie</div><span class="step-timing">⏱ 40 min</span></div><div class="step-desc">Versez dans des ramequins. Placez au bain-marie dans un plat. Four 150°C, 35-40 min. La crème doit trembler légèrement au centre. Réfrigérez 3 heures minimum.</div><div class="step-tip">Le grand dessert du samedi soir — prenez le temps de le préparer l'après-midi pour le déguster le soir.</div></div><div class="step-block"><div class="step-header"><div class="step-num">4</div><div class="step-title">Brûler le sucre</div><span class="step-timing">⏱ 1 min</span></div><div class="step-desc">Saupoudrez de cassonade juste avant de servir. Brûlez au chalumeau jusqu'à obtenir un caramel craquant doré.</div></div>`},
  "dim-des-midi":{title:"Sorbet maison banane-mangue",ingredients:[{name:"Banane congelée",base:1,unit:""},{name:"Mangue congelée",base:100,unit:"g"},{name:"Citron vert (jus)",base:1,unit:"c.à.s."}],steps:`<div class="step-block"><div class="step-header"><div class="step-num">1</div><div class="step-title">Congeler la veille</div><span class="step-timing">⏱ 4h</span></div><div class="step-desc">Coupez banane et mangue en morceaux. Mettez au congélateur minimum 4 heures ou la veille.</div></div><div class="step-block"><div class="step-header"><div class="step-num">2</div><div class="step-title">Mixer au dernier moment</div><span class="step-timing">⏱ 3 min</span></div><div class="step-desc">Sortez les fruits du congélateur. Mixez avec le jus de citron vert jusqu'à obtenir une texture crémeuse type glace italienne. Servez immédiatement ou remettez au congélateur 30 min pour une texture plus ferme.</div><div class="step-tip">Zéro ajout — les fruits congelés suffisent pour une texture onctueuse et sucrée naturellement. Le meilleur sorbet que vous ayez goûté.</div></div>`},
  "dim-des-soir":{title:"Gâteau yaourt moelleux citron-amande",ingredients:[{name:"Yaourt grec",base:125,unit:"g"},{name:"Oeufs",base:2,unit:""},{name:"Farine d'amande",base:80,unit:"g"},{name:"Farine complète",base:40,unit:"g"},{name:"Miel brut",base:3,unit:"c.à.s."},{name:"Citron (zeste + jus)",base:1,unit:""},{name:"Levure chimique",base:1,unit:"c.à.c."},{name:"Huile d'olive douce",base:2,unit:"c.à.s."}],steps:`<div class="step-block"><div class="step-header"><div class="step-num">1</div><div class="step-title">Mélanger les liquides</div><span class="step-timing">⏱ 5 min</span></div><div class="step-desc">Fouettez oeufs + miel + yaourt + huile d'olive + zeste et jus de citron. Mélangez bien jusqu'à homogénéité.</div></div><div class="step-block"><div class="step-header"><div class="step-num">2</div><div class="step-title">Incorporer les farines</div><span class="step-timing">⏱ 3 min</span></div><div class="step-desc">Ajoutez farine d'amande + farine complète + levure. Mélangez sans trop travailler la pâte — juste jusqu'à ce qu'il n'y ait plus de grumeaux.</div><div class="step-tip">La farine d'amande donne un moelleux exceptionnel et remplace en partie la farine blanche. Ce gâteau est naturellement humide.</div></div><div class="step-block"><div class="step-header"><div class="step-num">3</div><div class="step-title">Cuire</div><span class="step-timing">⏱ 30 min</span></div><div class="step-desc">Versez dans un moule huilé. Four 170°C, 30 min. La lame d'un couteau doit ressortir propre. Laissez tiédir avant de démouler.</div><div class="step-tip">Ce gâteau est encore meilleur le lendemain — les saveurs citron-amande se développent. Faites-le le dimanche pour la semaine.</div></div>`}
};;
